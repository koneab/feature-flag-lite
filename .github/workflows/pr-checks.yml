name: PR Checks

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]

permissions:
  contents: read
  pull-requests: write
  checks: write

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  type-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run TypeScript type check
        run: npx tsc --noEmit

  lint-annotations:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Get changed TypeScript files
        id: changed-files
        uses: tj-actions/changed-files@v44
        with:
          files: |
            src/**/*.ts
            tests/**/*.ts

      - name: Register ESLint problem matcher
        if: steps.changed-files.outputs.any_changed == 'true'
        run: echo "::add-matcher::.github/eslint-problem-matcher.json"

      - name: Run ESLint on changed files
        if: steps.changed-files.outputs.any_changed == 'true'
        run: npx eslint ${{ steps.changed-files.outputs.all_changed_files }} --format stylish

  coverage-report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm run test:coverage -- --ci --coverageReporters=text --coverageReporters=lcov --coverageReporters=json-summary

      - name: Check coverage threshold
        run: |
          node -e "
            const coverage = require('./coverage/coverage-summary.json');
            const linePct = coverage.total.lines.pct;
            console.log('Line coverage: ' + linePct + '%');
            if (linePct < 80) {
              console.error('Coverage ' + linePct + '% is below the 80% threshold');
              process.exit(1);
            }
            console.log('Coverage threshold met.');
          "

      - name: Post coverage comment
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const coverage = JSON.parse(fs.readFileSync('./coverage/coverage-summary.json', 'utf8'));
            const { lines, branches, functions, statements } = coverage.total;

            const linePct = lines.pct.toFixed(2);
            const branchPct = branches.pct.toFixed(2);
            const functionPct = functions.pct.toFixed(2);
            const statementPct = statements.pct.toFixed(2);

            const shortSha = context.sha.substring(0, 7);
            const marker = '<!-- coverage-report -->';

            const body = [
              marker,
              '## 📊 Test Coverage Report',
              '',
              '| Metric | Coverage |',
              '|--------|----------|',
              `| Lines | ${linePct}% |`,
              `| Branches | ${branchPct}% |`,
              `| Functions | ${functionPct}% |`,
              `| Statements | ${statementPct}% |`,
              '',
              `*Updated for commit \`${shortSha}\`*`,
            ].join('\n');

            try {
              const { data: comments } = await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
              });

              const existing = comments.find(c => c.body.includes(marker));

              if (existing) {
                await github.rest.issues.updateComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: existing.id,
                  body,
                });
              } else {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  body,
                });
              }
            } catch (error) {
              core.error(`Failed to post coverage comment: ${error.message}`);
              core.setFailed(`GitHub API request failed: ${error.message}`);
            }
